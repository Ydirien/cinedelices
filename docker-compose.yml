services:
  db:
    container_name: database
    image: postgres:17
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_LOCAL_PORT}:5432
    networks:
      - cinedelices-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cine_delices_api
    volumes:
      - ./api:/app
      - /app/node_modules
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./api/.env
    environment:
      # Écrase DATABASE_URL du .env : dans Docker, la DB est joignable via le nom du service "database" sur le port interne 5432
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    ports:
      - ${API_LOCAL_PORT}:3000

    networks:
      - cinedelices-network

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: cine_delices_front
    restart: always
    ports:
      - ${CLIENT_LOCAL_PORT}:5173
    volumes:
      - ./front:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_started
    networks:
      - cinedelices-network

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - ${ADMINER_LOCAL_PORT}:8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cinedelices-network

volumes:
  db_data:

networks:
  cinedelices-network:
