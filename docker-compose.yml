services:
  db:
    container_name: database
    image: postgres:17
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_LOCAL_PORT}:5432
    networks:
      - cinedelices-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cine_delices_api
    restart: always
    depends_on:
      - db
    env_file:
      - ./api/.env
    ports:
      - ${API_LOCAL_PORT}:3010
    networks:
      - cinedelices-network

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: cine_delices_front
    restart: always
    ports:
      - ${CLIENT_LOCAL_PORT}:80
    depends_on:
      - api
    networks:
      - cinedelices-network

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - ${ADMINER_LOCAL_PORT}:8080
    depends_on:
      - db
    networks:
      - cinedelices-network

volumes:
  db_data:

networks:
  cinedelices-network: